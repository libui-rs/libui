on:
  push:
    branches: [ "ci" ]
  pull_request:
    branches: [ "ci", "development" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install libgtk-3-dev
        run: sudo apt-get install -y libgtk-3-dev
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test --verbose

  build:
    needs:
      - build-linux
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build
        run: cargo build

